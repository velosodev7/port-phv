<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Verificação de propriedade no Google Search Console -->
    <meta
      name="google-site-verification"
      content="cBI4K_dXA9AJxHz_MhXP8akNW0ocx2gscyWxCI-CU6I"
    />

    <!-- Title, description, canonical e Open Graph/Twitter são por rota:
         renderizados pelo componente Seo (metadata nativa do React 19) e
         baked no HTML pelo prerender. Nada de title estático aqui, para não
         duplicar o que o React injeta. Ver src/Components/ui/Seo.jsx. -->

    <!-- Favicon: SVG pixel (avatar) com fallback PNG 48×48 p/ navegadores antigos.
         apple-touch-icon dedicado 180×180 (ambos rasterizados de favicon.svg). -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Tema do navegador (mobile chrome / safari) -->
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="color-scheme" content="dark" />

    <!-- Efeitos (CRT/scanline + animações): define data-fx antes do paint p/ evitar flash.
         Default segue o prefers-reduced-motion do SO quando não há preferência salva. -->
    <script>
      (function () {
        try {
          var v = localStorage.getItem("phv-fx");
          if (v !== "on" && v !== "off") {
            v = window.matchMedia("(prefers-reduced-motion: reduce)").matches
              ? "off"
              : "on";
          }
          document.documentElement.setAttribute("data-fx", v);
        } catch (e) {
          document.documentElement.setAttribute("data-fx", "on");
        }
      })();
    </script>

    <!-- Fontes self-hosted (woff2 latin em public/fonts/, @font-face em
         src/styles/fonts.css). Preload das duas fontes do Title Screen / LCP da
         home: o logo pixel (Press Start 2P) e as linhas HUD/mono (JetBrains Mono). -->
    <link
      rel="preload"
      href="/fonts/press-start-2p-400-latin.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="/fonts/jetbrains-mono-400-latin.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />

    <!-- SEO global (não varia por rota). description/OG/Twitter ficam no <Seo>. -->
    <meta
      name="keywords"
      content="Pedro Veloso, desenvolvedor full-stack, React, Node.js, PostgreSQL, portfólio, phvdev"
    />
    <meta name="author" content="Pedro Veloso" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
