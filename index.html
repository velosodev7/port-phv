<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Title, description, canonical e Open Graph/Twitter são por rota:
         renderizados pelo componente Seo (metadata nativa do React 19) e
         baked no HTML pelo prerender. Nada de title estático aqui, para não
         duplicar o que o React injeta. Ver src/Components/ui/Seo.jsx. -->

    <!-- Favicon: SVG pixel (avatar PV) com fallback PNG p/ navegadores antigos -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <!-- Tema do navegador (mobile chrome / safari) -->
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="color-scheme" content="dark" />

    <!-- Efeitos (CRT/scanline + animações): define data-fx antes do paint p/ evitar flash.
         Default segue o prefers-reduced-motion do SO quando não há preferência salva. -->
    <script>
      (function () {
        try {
          var v = localStorage.getItem("phv-fx");
          if (v !== "on" && v !== "off") {
            v = window.matchMedia("(prefers-reduced-motion: reduce)").matches
              ? "off"
              : "on";
          }
          document.documentElement.setAttribute("data-fx", v);
        } catch (e) {
          document.documentElement.setAttribute("data-fx", "on");
        }
      })();
    </script>

    <!-- Fontes (carregadas via <link>, nunca via @import) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />

    <!-- SEO global (não varia por rota). description/OG/Twitter ficam no <Seo>. -->
    <meta
      name="keywords"
      content="Pedro Veloso, desenvolvedor full-stack, React, Node.js, PostgreSQL, portfólio, phvdev"
    />
    <meta name="author" content="Pedro Veloso" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
