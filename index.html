<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Pedro Veloso — Desenvolvedor Full-stack</title>

    <!-- Favicon (usa logo.png enquanto não há favicons dedicados) -->
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <!-- Tema do navegador (mobile chrome / safari) -->
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="color-scheme" content="dark" />

    <!-- Fontes (carregadas via <link>, nunca via @import) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <!-- SEO -->
    <meta
      name="description"
      content="Portfólio de Pedro Veloso, desenvolvedor full-stack focado em React, Node.js e PostgreSQL. Projetos, stack técnica e contato."
    />
    <meta
      name="keywords"
      content="Pedro Veloso, desenvolvedor full-stack, React, Node.js, PostgreSQL, portfólio, phvdev"
    />
    <meta name="author" content="Pedro Veloso" />

    <!-- Open Graph / Redes Sociais -->
    <meta property="og:title" content="Pedro Veloso — Desenvolvedor Full-stack" />
    <meta
      property="og:description"
      content="Construindo produtos web com React, Node.js e PostgreSQL. Foco em performance, DX e entregas previsíveis."
    />
    <meta property="og:image" content="/logo.png" />
    <meta property="og:url" content="https://www.phvdev.com.br" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="pt_BR" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Pedro Veloso — Desenvolvedor Full-stack" />
    <meta
      name="twitter:description"
      content="Construindo produtos web com React, Node.js e PostgreSQL. Foco em performance, DX e entregas previsíveis."
    />
    <meta name="twitter:image" content="/logo.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
